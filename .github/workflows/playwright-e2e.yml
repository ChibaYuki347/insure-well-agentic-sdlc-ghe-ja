name: Playwright E2E

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - ".github/workflows/playwright-e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    name: E2E (React + Spring Boot)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: src/frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          set -euo pipefail
          cd src/backend
          ./mvnw -B -DskipTests spring-boot:run > ../../backend.log 2>&1 &
          echo $! > ../../backend.pid

      - name: Wait for backend health
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8080/api/health >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready"
          tail -n 200 backend.log || true
          exit 1

      - name: Start frontend
        run: |
          set -euo pipefail
          cd src/frontend
          BROWSER=none npm start > ../../frontend.log 2>&1 &
          echo $! > ../../frontend.pid

      - name: Wait for frontend ready
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready"
          tail -n 200 frontend.log || true
          exit 1

      - name: Run Playwright tests
        working-directory: src/frontend
        env:
          CI: "true"
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-junit.xml
        run: npx playwright test --reporter=list,html,junit

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/frontend/playwright-report
          if-no-files-found: warn

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: src/frontend/test-results
          if-no-files-found: warn

      - name: Upload Playwright JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: src/frontend/playwright-junit.xml
          if-no-files-found: warn

      - name: Upload startup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-logs
          path: |
            backend.log
            frontend.log
          if-no-files-found: warn

      - name: Stop services
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi
          if [ -f frontend.pid ]; then
            kill "$(cat frontend.pid)" || true
          fi
